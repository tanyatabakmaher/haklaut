<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לומדת הכנה לבגרות בחקלאות</title>
  <meta name="description" content="מסך ראשי ללומדות הכנה לבגרות בחקלאות" />
  <style>
    :root{
      --bg1:#5aa4c3;
      --bg2:#2f6f8d;
      --panel:#ffffff;
      --text:#18311f;
      --muted:#5c7363;
      --accent:#4a8c5f;
      --accent-dark:#2c6a45;
      --border:#d8e7da;
      --danger:#c44b4b;
      --danger-bg:#fff2f2;
      --shadow:0 14px 36px rgba(24,49,31,0.10);
      --shadow-strong:0 18px 40px rgba(24,49,31,0.16);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html, body, button, input {
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1250px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .hero{
      padding:6px 4px 18px;
      margin-bottom:24px;
      position:relative;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:-30px;
      top:-30px;
      width:160px;
      height:160px;
      background:radial-gradient(circle, rgba(255,255,255,0.16), transparent 70%);
      pointer-events:none;
      z-index:-1;
    }

    h1{
      margin:0;
      font-size:clamp(34px,4.8vw,54px);
      line-height:1.08;
      font-weight:900;
      color:#ffffff;
      text-shadow:0 3px 14px rgba(0,0,0,0.16);
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:nowrap;
      white-space:nowrap;
      min-width:0;
    }

    .hero-title-text{
      min-width:0;
      flex:1 1 auto;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hero-title-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:52px;
      height:52px;
      border-radius:16px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
      font-size:28px;
      line-height:1;
      flex:0 0 auto;
    }

    .hidden{
      display:none !important;
    }

    .grid-view{display:block}
    .grid-view.hidden{display:none}

    .sections-stack{
      display:grid;
      gap:24px;
    }

    .section-shell{
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      border-radius:28px;
      padding:24px;
      box-shadow:0 12px 28px rgba(0,0,0,0.08);
      backdrop-filter:blur(6px);
    }

    .section-kicker{
      margin:0 0 18px;
      font-size:28px;
      font-weight:900;
      color:#ffffff;
      line-height:1.2;
      letter-spacing:0;
      text-shadow:0 2px 10px rgba(0,0,0,0.12);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .section-kicker-icon{
      font-size:30px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:310px;
      text-decoration:none;
      color:inherit;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor:pointer;
      position:relative;
      padding:0;
    }

    .card:hover,
    .card:focus-visible{
      transform:translateY(-6px) scale(1.01);
      box-shadow:var(--shadow-strong);
      border-color:#b9d6bf;
      outline:none;
    }

    .card-media{
      height:170px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#ffffff;
      padding:18px;
      border-bottom:1px solid #eef3ef;
    }

    .card-media img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#ffffff;
    }

    .card-media::after{
      content:none;
    }

    .card-media.fallback{
      font-size:60px;
      color:var(--accent-dark);
      background:#ffffff;
      border-bottom:1px solid #eef3ef;
    }

    .card-body{
      padding:18px 18px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      background:#ffffff;
    }

    .card-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .card-text{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
    }

    .card-footer{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:auto;
      font-size:17px;
      font-weight:900;
      line-height:1;
      color:#fff;
      padding:14px 26px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      box-shadow:0 10px 20px rgba(74,140,95,0.20);
      align-self:center;
      transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      letter-spacing:0.01em;
    }

    .card:hover .card-footer,
    .card:focus-visible .card-footer{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 14px 24px rgba(74,140,95,0.28);
    }

    .state{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:24px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .login-view{
      min-height:calc(100vh - 64px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 0 8px;
    }

    .login-shell{
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      border-radius:28px;
      padding:20px;
      box-shadow:0 12px 28px rgba(0,0,0,0.08);
      backdrop-filter:blur(6px);
    }

    .login-card{
      background:#ffffff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 24px;
    }

    .login-badge{
      width:64px;
      height:64px;
      margin:0 auto 16px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, rgba(74,140,95,0.18), rgba(90,164,195,0.20));
      border:1px solid var(--border);
      box-shadow:0 8px 18px rgba(0,0,0,0.08);
      font-size:32px;
    }

    .login-title{
      margin:0;
      text-align:center;
      font-size:clamp(28px, 4vw, 36px);
      line-height:1.2;
      font-weight:900;
      color:var(--text);
    }

    .login-subtitle{
      margin:10px 0 0;
      text-align:center;
      color:var(--muted);
      font-size:17px;
      line-height:1.7;
    }

    .login-form{
      margin-top:26px;
      display:grid;
      gap:16px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field-label{
      font-size:15px;
      font-weight:700;
      color:var(--text);
    }

    .field-input{
      width:100%;
      border:1px solid var(--border);
      border-radius:16px;
      padding:15px 16px;
      font-size:16px;
      color:var(--text);
      background:#ffffff;
      box-shadow:inset 0 1px 2px rgba(24,49,31,0.04);
      transition:border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .field-input:focus{
      outline:none;
      border-color:#9ccdb0;
      box-shadow:0 0 0 4px rgba(74,140,95,0.12);
    }

    .login-error{
      display:none;
      border:1px solid #f1c8c8;
      background:var(--danger-bg);
      color:var(--danger);
      border-radius:16px;
      padding:12px 14px;
      font-size:15px;
      line-height:1.6;
      font-weight:700;
    }

    .login-error.show{
      display:block;
    }

    .login-btn{
      width:100%;
      justify-content:center;
      font-size:18px;
      padding:15px 22px;
      margin-top:4px;
    }

    .login-note{
      margin:16px 0 0;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .lesson-view{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:#fff;
      overflow:hidden;
    }

    .lesson-view.show{display:block}

    .lesson-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 20px;
      background:linear-gradient(135deg,#eef8f0,#f8fbf8);
      border-bottom:1px solid var(--border);
      min-height:76px;
    }

    .lesson-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:13px 22px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      background:linear-gradient(135deg,var(--accent-dark),var(--accent));
      color:#fff;
      box-shadow:0 10px 20px rgba(21,128,61,0.22);
      letter-spacing:0.01em;
    }

    .btn:hover{transform:translateY(-1px)}

    .iframe-wrap{
      height:calc(100vh - 76px);
      min-height:0;
      background:#fff;
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    @media (max-width: 740px){
      .wrap{padding:18px 14px 28px}
      .hero{padding:4px 2px 14px}
      h1{font-size:clamp(22px,6vw,32px); gap:8px; line-height:1.1}
      .hero-title-icon{width:40px; height:40px; font-size:22px; border-radius:12px}
      .hero-title-text{overflow:visible; text-overflow:clip}
      .sections-stack{gap:18px}
      .section-shell{padding:16px}
      .section-kicker{font-size:22px; margin-bottom:14px; line-height:1.2; gap:8px}
      .section-kicker-icon{font-size:24px}
      .card{min-height:280px}
      .card-title{font-size:22px}
      .lesson-title{font-size:21px}
      .lesson-topbar{padding:14px 16px; min-height:72px}
      .iframe-wrap{height:calc(100vh - 72px)}
      .card-footer{font-size:16px; padding:13px 22px}
      .btn{font-size:15px}
      .card-media{height:160px}
      .login-view{min-height:calc(100vh - 44px); padding-top:6px}
      .login-shell{padding:14px}
      .login-card{padding:22px 18px}
      .login-title{font-size:26px}
      .login-subtitle{font-size:16px}
      .field-input{padding:14px 14px}
      .login-btn{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1><span class="hero-title-icon" aria-hidden="true">🎓</span><span class="hero-title-text">לומדת הכנה לבגרות בחקלאות</span></h1>
    </section>

    <section id="loginView" class="login-view" aria-live="polite">
      <div class="login-shell">
        <div class="login-card">
          <div class="login-badge" aria-hidden="true">🌿</div>
          <h2 class="login-title">כניסה ללומדת הכנה לבגרות בחקלאות</h2>
          <p class="login-subtitle">התחברו כדי לצפות בלומדות</p>

          <form id="loginForm" class="login-form" novalidate>
            <div id="loginError" class="login-error" role="alert">שם המשתמש או הסיסמה שגויים</div>

            <div class="field">
              <label class="field-label" for="usernameInput">שם משתמש</label>
              <input id="usernameInput" class="field-input" name="username" type="text" placeholder="שם משתמש" autocomplete="username" required />
            </div>

            <div class="field">
              <label class="field-label" for="passwordInput">סיסמה</label>
              <input id="passwordInput" class="field-input" name="password" type="password" placeholder="סיסמה" autocomplete="current-password" required />
            </div>

            <button class="btn login-btn" type="submit">התחברות</button>
          </form>

          <p class="login-note">הכניסה מיועדת לצפייה בלומדות ההכנה לבגרות בחקלאות.</p>
        </div>
      </div>
    </section>

    <section id="gridView" class="grid-view hidden">
      <div id="sectionsContainer" class="sections-stack"></div>
    </section>

    <section id="lessonView" class="lesson-view" aria-live="polite">
      <div class="lesson-topbar">
        <h2 id="lessonTitle" class="lesson-title">שם הלומדה</h2>
        <button id="backBtn" class="btn" type="button">חזרה למסך הראשי</button>
      </div>
      <div class="iframe-wrap">
        <iframe id="lessonFrame" title="לומדה"></iframe>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const sectionsContainer = document.getElementById('sectionsContainer');
    const loginView = document.getElementById('loginView');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const gridView = document.getElementById('gridView');
    const lessonView = document.getElementById('lessonView');
    const lessonFrame = document.getElementById('lessonFrame');
    const lessonTitle = document.getElementById('lessonTitle');
    const backBtn = document.getElementById('backBtn');

    const MENU_FILE = 'menu.xlsx';
    const LOGIN_USERNAME = 'admin';
    const LOGIN_PASSWORD = 'admin';

    const SECTION_CONFIG = {
      general: {
        title: 'תחום בעלי החיים - נושאים משותפים',
        icon: '🐾'
      },
      dogs: {
        title: 'כלבים',
        icon: '🐶'
      }
    };

    function getFallbackIcon(title) {
      const t = String(title || '').trim();
      if (t.includes('מבוא')) return '🌱';
      if (t.includes('ויסות חום על ידי החקלאי')) return '🐔';
      if (t.includes('ויסות חום')) return '🌡️';
      if (t.includes('חיסון') || t.includes('החיסון')) return '🛡️';
      if (t.includes('נשימה')) return '🫁';
      if (t.includes('רבייה') || t.includes('הרבייה')) return '🐣';
      if (t.includes('כלבים') || t.includes('גור')) return '🐶';
      return '📘';
    }

    function getDefaultDescription(title) {
      const t = String(title || '').trim();
      if (t.includes('מבוא')) return 'מושגי יסוד, רקע והבנה ראשונית של עולם החקלאות.';
      if (t.includes('ויסות חום על ידי החקלאי')) return 'תנאי ממשק, אוורור, חימום, קירור וטיפול נכון בסביבת הגידול.';
      if (t.includes('ויסות חום')) return 'הבנת שמירת חום הגוף, התאמה לסביבה ומנגנוני קירור וחימום.';
      if (t.includes('חיסון') || t.includes('החיסון')) return 'מחלות, קווי הגנה, חיסונים, מונחים מרכזיים ותרגול להבנה.';
      if (t.includes('נשימה')) return 'מבנה מערכת הנשימה, חילוף גזים, נשימה בעופות וביונקים ותרגול.';
      if (t.includes('רבייה') || t.includes('הרבייה')) return 'מבנה מערכת הרבייה, הורמונים, מחזוריות, הפריה ויישומים חקלאיים.';
      if (t.includes('כלבים') || t.includes('גור')) return 'התפתחות הגור, חושים, תקופות קריטיות ויישום מעשי בגידול כלבים.';
      return 'לומדה אינטראקטיבית להכנה לבגרות בחקלאות.';
    }

    function getDescription(row) {
      const subTitle = String(row.sub_title || '').trim();
      return subTitle || getDefaultDescription(row.page_name);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeUrl(url) {
      const trimmed = String(url || '').trim();
      return trimmed || '#';
    }

    function normalizeTopic(value) {
      const topic = String(value || '').trim().toLowerCase();
      if (!topic) return 'general';
      if (topic === 'general' || topic === 'dogs') return topic;
      return '';
    }

    function buildMediaHtml(row) {
      const iconUrl = normalizeUrl(row.menu_icon);
      const fallbackIcon = getFallbackIcon(row.page_name);

      if (iconUrl && iconUrl !== '#') {
        return `
          <div class="card-media">
            <img src="${escapeHtml(iconUrl)}" alt="${escapeHtml(row.page_name)}" loading="lazy"
                 onerror="this.parentElement.classList.add('fallback'); this.remove(); this.parentElement.innerHTML='${fallbackIcon}';">
          </div>
        `;
      }

      return `<div class="card-media fallback">${fallbackIcon}</div>`;
    }

    function buildCard(row) {
      const button = document.createElement('button');
      button.className = 'card';
      button.type = 'button';
      button.dataset.title = row.page_name;
      button.dataset.url = normalizeUrl(row.page_url);
      button.setAttribute('aria-label', `פתיחת הלומדה ${row.page_name}`);

      button.innerHTML = `
        ${buildMediaHtml(row)}
        <div class="card-body">
          <h2 class="card-title">${escapeHtml(row.page_name)}</h2>
          <p class="card-text">${escapeHtml(getDescription(row))}</p>
          <div class="card-footer">כניסה ללומדה</div>
        </div>
      `;

      button.addEventListener('click', () => {
        openLesson(row.page_name, row.page_url);
      });

      return button;
    }

    function buildSection(key, rows) {
      const config = SECTION_CONFIG[key];
      if (!config || !rows.length) return null;

      const wrapper = document.createElement('div');
      wrapper.className = 'section-shell';

      const heading = document.createElement('p');
      heading.className = 'section-kicker';
      heading.innerHTML = `<span class="section-kicker-icon" aria-hidden="true">${config.icon}</span><span>${escapeHtml(config.title)}</span>`;

      const grid = document.createElement('div');
      grid.className = 'grid';

      rows.forEach(row => grid.appendChild(buildCard(row)));

      wrapper.appendChild(heading);
      wrapper.appendChild(grid);
      return wrapper;
    }

    function renderSections(rows) {
      sectionsContainer.innerHTML = '';

      const groups = {
        general: [],
        dogs: []
      };

      rows.forEach(row => {
        const topic = normalizeTopic(row.topic);
        if (topic && groups[topic]) {
          groups[topic].push(row);
        }
      });

      const generalSection = buildSection('general', groups.general);
      const dogsSection = buildSection('dogs', groups.dogs);

      if (generalSection) sectionsContainer.appendChild(generalSection);
      if (dogsSection) sectionsContainer.appendChild(dogsSection);

      if (!generalSection && !dogsSection) {
        sectionsContainer.innerHTML = '<div class="state">לא נמצאו לומדות להצגה.</div>';
      }
    }

    async function loadMenu() {
      const response = await fetch(`${MENU_FILE}?v=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.arrayBuffer();
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheet];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      return rows
        .map(row => ({
          page_name: String(row.page_name || '').trim(),
          page_url: String(row.page_url || '').trim(),
          menu_icon: String(row.menu_icon || '').trim(),
          topic: String(row.topic || row.Topic || row['נושא'] || '').trim(),
          sub_title: String(row.sub_title || row.subTitle || row['sub title'] || row['subtitle'] || row['תת כותרת'] || '').trim()
        }))
        .filter(row => row.page_name && row.page_url);
    }

    function openLesson(title, url) {
      lessonTitle.textContent = title;
      lessonFrame.src = normalizeUrl(url);
      gridView.classList.add('hidden');
      lessonView.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goHome() {
      lessonFrame.src = '';
      lessonView.classList.remove('show');
      gridView.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showLoginError(message) {
      loginError.textContent = message;
      loginError.classList.add('show');
    }

    function clearLoginError() {
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    function showMainMenu() {
      loginView.classList.add('hidden');
      gridView.classList.remove('hidden');
      clearLoginError();
    }

    function handleLogin(event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (username === LOGIN_USERNAME && password === LOGIN_PASSWORD) {
        showMainMenu();
        passwordInput.value = '';
        return;
      }

      showLoginError('שם המשתמש או הסיסמה שגויים');
      passwordInput.value = '';
      passwordInput.focus();
    }

    backBtn.addEventListener('click', goHome);
    loginForm.addEventListener('submit', handleLogin);

    usernameInput.addEventListener('input', clearLoginError);
    passwordInput.addEventListener('input', clearLoginError);

    async function init() {
      try {
        const rows = await loadMenu();
        renderSections(rows);
      } catch (error) {
        console.error(error);
        sectionsContainer.innerHTML = `
          <div class="state">
            לא הצלחתי לטעון את הקובץ <strong>menu.xlsx</strong>.<br>
            ודאי שהוא נמצא באותה תיקייה כמו קובץ ה־HTML ושהעמודות נקראות בדיוק
            <strong>page_name</strong>, <strong>page_url</strong>, <strong>menu_icon</strong>, <strong>topic</strong> ו־<strong>sub_title</strong>.
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
