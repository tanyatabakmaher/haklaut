<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לומדת הכנה ל־5 יחידות בגרות בחקלאות</title>
  <meta name="description" content="מסך ראשי ללומדות הכנה ל־5 יחידות בגרות בחקלאות" />
  <style>
    :root{
      --bg1:#f6fbf5;
      --bg2:#e7f4eb;
      --panel:#ffffff;
      --text:#18311f;
      --muted:#5c7363;
      --accent:#4a8c5f;
      --accent-dark:#2c6a45;
      --border:#d8e7da;
      --shadow:0 14px 36px rgba(24,49,31,0.10);
      --shadow-strong:0 18px 40px rgba(24,49,31,0.16);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html, body, button, input {
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1250px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(245,252,246,0.95));
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:28px 24px;
      margin-bottom:24px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:-40px;
      top:-40px;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(134,197,163,0.25), transparent 70%);
      pointer-events:none;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(30px,4vw,48px);
      line-height:1.1;
      font-weight:800;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.8;
      max-width:860px;
      font-weight:600;
    }

    .grid-view{display:block}
    .grid-view.hidden{display:none}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:310px;
      text-decoration:none;
      color:inherit;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor:pointer;
      position:relative;
      padding:0;
    }

    .card:hover,
    .card:focus-visible{
      transform:translateY(-6px) scale(1.01);
      box-shadow:var(--shadow-strong);
      border-color:#b9d6bf;
      outline:none;
    }

    .card-media{
      height:170px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:linear-gradient(135deg,#d4fc79,#96e6a1);
    }

    .card-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .card-media::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.12));
      pointer-events:none;
    }

    .card-media.fallback{
      font-size:60px;
      color:#ffffff;
    }

    .card-body{
      padding:18px 18px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .card-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .card-text{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
    }

    .card-footer{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:auto;
      font-size:17px;
      font-weight:900;
      line-height:1;
      color:#fff;
      padding:14px 26px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      box-shadow:0 10px 20px rgba(74,140,95,0.20);
      align-self:center;
      transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      letter-spacing:0.01em;
    }

    .card:hover .card-footer,
    .card:focus-visible .card-footer{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 14px 24px rgba(74,140,95,0.28);
    }

    .state{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:24px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .lesson-view{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:#fff;
      overflow:hidden;
    }

    .lesson-view.show{display:block}

    .lesson-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 20px;
      background:linear-gradient(135deg,#eef8f0,#f8fbf8);
      border-bottom:1px solid var(--border);
      min-height:76px;
    }

    .lesson-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:13px 22px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      background:linear-gradient(135deg,var(--accent-dark),var(--accent));
      color:#fff;
      box-shadow:0 10px 20px rgba(21,128,61,0.22);
      letter-spacing:0.01em;
    }

    .btn:hover{transform:translateY(-1px)}

    .iframe-wrap{
      height:calc(100vh - 76px);
      min-height:0;
      background:#fff;
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    @media (max-width: 740px){
      .hero{padding:22px 16px}
      .subtitle{font-size:16px}
      .card{min-height:280px}
      .card-title{font-size:22px}
      .lesson-title{font-size:21px}
      .lesson-topbar{padding:14px 16px; min-height:72px}
      .iframe-wrap{height:calc(100vh - 72px)}
      .card-footer{font-size:16px; padding:13px 22px}
      .btn{font-size:15px}
      .card-media{height:160px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>לומדת הכנה ל־5 יחידות בגרות בחקלאות</h1>
      <p class="subtitle">כאן תמצאו את כל הלומדות במקום אחד: נושאי יסוד, סיכומים, המחשות ותרגול אינטראקטיבי בדרך ברורה, קצרה ונוחה ללמידה.</p>
    </section>

    <section id="gridView" class="grid-view">
      <main id="cardsGrid" class="grid" aria-live="polite"></main>
    </section>

    <section id="lessonView" class="lesson-view" aria-live="polite">
      <div class="lesson-topbar">
        <h2 id="lessonTitle" class="lesson-title">שם הלומדה</h2>
        <button id="backBtn" class="btn" type="button">חזרה למסך הראשי</button>
      </div>
      <div class="iframe-wrap">
        <iframe id="lessonFrame" title="לומדה"></iframe>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const cardsGrid = document.getElementById('cardsGrid');
    const gridView = document.getElementById('gridView');
    const lessonView = document.getElementById('lessonView');
    const lessonFrame = document.getElementById('lessonFrame');
    const lessonTitle = document.getElementById('lessonTitle');
    const backBtn = document.getElementById('backBtn');

    const MENU_FILE = 'menu.xlsx';

    function getFallbackIcon(title) {
      const t = String(title || '').trim();
      if (t.includes('מבוא')) return '🌱';
      if (t.includes('ויסות חום על ידי החקלאי')) return '🐔';
      if (t.includes('ויסות חום')) return '🌡️';
      if (t.includes('חיסון') || t.includes('החיסון')) return '🛡️';
      if (t.includes('נשימה')) return '🫁';
      if (t.includes('רבייה') || t.includes('הרבייה')) return '🐣';
      return '📘';
    }

    function getDescription(title) {
      const t = String(title || '').trim();
      if (t.includes('מבוא')) return 'מושגי יסוד, רקע והבנה ראשונית של עולם החקלאות.';
      if (t.includes('ויסות חום על ידי החקלאי')) return 'תנאי ממשק, אוורור, חימום, קירור וטיפול נכון בסביבת הגידול.';
      if (t.includes('ויסות חום')) return 'הבנת שמירת חום הגוף, התאמה לסביבה ומנגנוני קירור וחימום.';
      if (t.includes('חיסון') || t.includes('החיסון')) return 'מחלות, קווי הגנה, חיסונים, מונחים מרכזיים ותרגול להבנה.';
      if (t.includes('נשימה')) return 'מבנה מערכת הנשימה, חילוף גזים, נשימה בעופות וביונקים ותרגול.';
      if (t.includes('רבייה') || t.includes('הרבייה')) return 'מבנה מערכת הרבייה, הורמונים, מחזוריות, הפריה ויישומים חקלאיים.';
      return 'לומדה אינטראקטיבית להכנה לבגרות בחקלאות.';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeUrl(url) {
      const trimmed = String(url || '').trim();
      return trimmed || '#';
    }

    function buildMediaHtml(row) {
      const iconUrl = normalizeUrl(row.menu_icon);
      const fallbackIcon = getFallbackIcon(row.page_name);

      if (iconUrl && iconUrl !== '#') {
        return `
          <div class="card-media">
            <img src="${escapeHtml(iconUrl)}" alt="${escapeHtml(row.page_name)}" loading="lazy"
                 onerror="this.parentElement.classList.add('fallback'); this.remove(); this.parentElement.innerHTML='${fallbackIcon}';">
          </div>
        `;
      }

      return `<div class="card-media fallback">${fallbackIcon}</div>`;
    }

    function buildCard(row) {
      const button = document.createElement('button');
      button.className = 'card';
      button.type = 'button';
      button.dataset.title = row.page_name;
      button.dataset.url = normalizeUrl(row.page_url);
      button.setAttribute('aria-label', `פתיחת הלומדה ${row.page_name}`);

      button.innerHTML = `
        ${buildMediaHtml(row)}
        <div class="card-body">
          <h2 class="card-title">${escapeHtml(row.page_name)}</h2>
          <p class="card-text">${escapeHtml(getDescription(row.page_name))}</p>
          <div class="card-footer">כניסה ללומדה</div>
        </div>
      `;

      button.addEventListener('click', () => {
        openLesson(row.page_name, row.page_url);
      });

      return button;
    }

    function renderCards(rows) {
      cardsGrid.innerHTML = '';

      if (!rows.length) {
        cardsGrid.innerHTML = '<div class="state">לא נמצאו לומדות להצגה.</div>';
        return;
      }

      rows.forEach(row => {
        cardsGrid.appendChild(buildCard(row));
      });
    }

    async function loadMenu() {
      const response = await fetch(`${MENU_FILE}?v=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.arrayBuffer();
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheet];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      return rows
        .map(row => ({
          page_name: String(row.page_name || '').trim(),
          page_url: String(row.page_url || '').trim(),
          menu_icon: String(row.menu_icon || '').trim()
        }))
        .filter(row => row.page_name && row.page_url);
    }

    function openLesson(title, url) {
      lessonTitle.textContent = title;
      lessonFrame.src = normalizeUrl(url);
      gridView.classList.add('hidden');
      lessonView.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goHome() {
      lessonFrame.src = '';
      lessonView.classList.remove('show');
      gridView.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    backBtn.addEventListener('click', goHome);

    async function init() {
      try {
        const rows = await loadMenu();
        renderCards(rows);
      } catch (error) {
        console.error(error);
        cardsGrid.innerHTML = `
          <div class="state">
            לא הצלחתי לטעון את הקובץ <strong>menu.xlsx</strong>.<br>
            ודאי שהוא נמצא באותה תיקייה כמו קובץ ה־HTML ושהעמודות נקראות בדיוק
            <strong>page_name</strong>, <strong>page_url</strong> ו־<strong>menu_icon</strong>.
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
