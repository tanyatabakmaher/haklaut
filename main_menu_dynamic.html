<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לומדת הכנה ל־5 יחידות בגרות בחקלאות</title>
  <meta name="description" content="מסך ראשי ללומדות הכנה ל־5 יחידות בגרות בחקלאות" />
  <style>
    :root{
      --bg1:#5aa4c3;
      --bg2:#2f6f8d;
      --panel:#ffffff;
      --text:#18311f;
      --muted:#5c7363;
      --accent:#4a8c5f;
      --accent-dark:#2c6a45;
      --border:#d8e7da;
      --shadow:0 14px 36px rgba(24,49,31,0.10);
      --shadow-strong:0 18px 40px rgba(24,49,31,0.16);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html, body, button, input {
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1250px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .hero{
      padding:6px 4px 18px;
      margin-bottom:24px;
      position:relative;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:-30px;
      top:-30px;
      width:160px;
      height:160px;
      background:radial-gradient(circle, rgba(255,255,255,0.16), transparent 70%);
      pointer-events:none;
      z-index:-1;
    }

    h1{
      margin:0;
      font-size:clamp(34px,4.8vw,54px);
      line-height:1.08;
      font-weight:900;
      color:#ffffff;
      text-shadow:0 3px 14px rgba(0,0,0,0.16);
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .hero-title-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:56px;
      height:56px;
      border-radius:18px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
      font-size:30px;
      line-height:1;
      flex-shrink:0;
    }

        .grid-view{display:block}
    .grid-view.hidden{display:none}

    .section-shell{
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      border-radius:28px;
      padding:24px;
      box-shadow:0 12px 28px rgba(0,0,0,0.08);
      backdrop-filter:blur(6px);
    }

    .section-kicker{
      margin:0 0 18px;
      font-size:28px;
      font-weight:900;
      color:#ffffff;
      line-height:1.2;
      letter-spacing:0;
      text-shadow:0 2px 10px rgba(0,0,0,0.12);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .section-kicker-icon{
      font-size:30px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:310px;
      text-decoration:none;
      color:inherit;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor:pointer;
      position:relative;
      padding:0;
    }

    .card:hover,
    .card:focus-visible{
      transform:translateY(-6px) scale(1.01);
      box-shadow:var(--shadow-strong);
      border-color:#b9d6bf;
      outline:none;
    }

    .card-media{
      height:170px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#ffffff;
      padding:18px;
    }

    .card-media img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#ffffff;
    }

    .card-media::after{
      content:none;
    }

    .card-media.fallback{
      font-size:60px;
      color:var(--accent-dark);
      background:#ffffff;
      border-bottom:1px solid #eef3ef;
    }

    .card-body{
      padding:18px 18px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      background:#ffffff;
    }

    .card-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .card-text{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
    }

    .card-footer{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:auto;
      font-size:17px;
      font-weight:900;
      line-height:1;
      color:#fff;
      padding:14px 26px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      box-shadow:0 10px 20px rgba(74,140,95,0.20);
      align-self:center;
      transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      letter-spacing:0.01em;
    }

    .card:hover .card-footer,
    .card:focus-visible .card-footer{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 14px 24px rgba(74,140,95,0.28);
    }

    .lesson-view{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:#fff;
      overflow:hidden;
    }

    .lesson-view.show{display:block}

    .lesson-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 20px;
      background:linear-gradient(135deg,#eef8f0,#f8fbf8);
      border-bottom:1px solid var(--border);
      min-height:76px;
    }

    .lesson-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:13px 22px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      background:linear-gradient(135deg,var(--accent-dark),var(--accent));
      color:#fff;
      box-shadow:0 10px 20px rgba(21,128,61,0.22);
      letter-spacing:0.01em;
    }

    .btn:hover{transform:translateY(-1px)}

    .iframe-wrap{
      height:calc(100vh - 76px);
      min-height:0;
      background:#fff;
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    @media (max-width: 740px){
      .hero{padding:4px 2px 14px}
      h1{font-size:clamp(28px,9vw,40px); gap:10px}
      .hero-title-icon{width:46px; height:46px; font-size:24px; border-radius:14px}
      .section-shell{padding:16px}
      .section-kicker{font-size:22px; margin-bottom:14px; line-height:1.2; gap:8px}
      .section-kicker-icon{font-size:24px}
      .hero{padding:18px 16px}
      .subtitle{font-size:16px}
      .card{min-height:280px}
      .card-title{font-size:22px}
      .lesson-title{font-size:21px}
      .lesson-topbar{padding:14px 16px; min-height:72px}
      .iframe-wrap{height:calc(100vh - 72px)}
      .card-footer{font-size:16px; padding:13px 22px}
      .btn{font-size:15px}
      .card-media{height:160px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1><span class="hero-title-icon" aria-hidden="true">🎓</span><span>לומדת הכנה ל־5 יחידות בגרות בחקלאות</span></h1>
    </section>

    <section id="gridView" class="grid-view">
      <div class="section-shell">
        <p class="section-kicker"><span class="section-kicker-icon" aria-hidden="true">🐾</span><span>תחום בעלי החיים - נושאים משותפים</span></p>
        <main id="cardsGrid" class="grid" aria-live="polite">
        <button class="card" type="button" data-title="מבוא לחקלאות" data-url="mavo.html">
          <div class="card-media fallback">🌱</div>
          <div class="card-body">
            <h2 class="card-title">מבוא לחקלאות</h2>
            <p class="card-text">מושגי יסוד, רקע והבנה ראשונית של עולם החקלאות.</p>
            <div class="card-footer">כניסה ללומדה</div>
          </div>
        </button>

        <button class="card" type="button" data-title="ויסות חום בעלי חיים" data-url="visut-hom-klali.html">
          <div class="card-media fallback">🌡️</div>
          <div class="card-body">
            <h2 class="card-title">ויסות חום בעלי חיים</h2>
            <p class="card-text">הבנת שמירת חום הגוף, התאמה לסביבה ומנגנוני קירור וחימום.</p>
            <div class="card-footer">כניסה ללומדה</div>
          </div>
        </button>

        <button class="card" type="button" data-title="ויסות חום על ידי החקלאי" data-url="visut-hom-haklai.html">
          <div class="card-media fallback">🐔</div>
          <div class="card-body">
            <h2 class="card-title">ויסות חום על ידי החקלאי</h2>
            <p class="card-text">תנאי ממשק, אוורור, חימום, קירור וטיפול נכון בסביבת הגידול.</p>
            <div class="card-footer">כניסה ללומדה</div>
          </div>
        </button>

        <button class="card" type="button" data-title="מערכת החיסון" data-url="maarehet-hisun.html">
          <div class="card-media fallback">🛡️</div>
          <div class="card-body">
            <h2 class="card-title">מערכת החיסון</h2>
            <p class="card-text">מחלות, קווי הגנה, חיסונים, מונחים מרכזיים ותרגול להבנה.</p>
            <div class="card-footer">כניסה ללומדה</div>
          </div>
        </button>

        <button class="card" type="button" data-title="מערכת הנשימה" data-url="maarehet-neshima.html">
          <div class="card-media fallback">🫁</div>
          <div class="card-body">
            <h2 class="card-title">מערכת הנשימה</h2>
            <p class="card-text">מבנה מערכת הנשימה, חילוף גזים, נשימה בעופות וביונקים ותרגול.</p>
            <div class="card-footer">כניסה ללומדה</div>
          </div>
        </button>
      </main>
      </div>
    </section>

    <section id="lessonView" class="lesson-view" aria-live="polite">
      <div class="lesson-topbar">
        <h2 id="lessonTitle" class="lesson-title">שם הלומדה</h2>
        <button id="backBtn" class="btn" type="button">חזרה למסך הראשי</button>
      </div>
      <div class="iframe-wrap">
        <iframe id="lessonFrame" title="לומדה"></iframe>
      </div>
    </section>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll('.card'));
    const gridView = document.getElementById('gridView');
    const lessonView = document.getElementById('lessonView');
    const lessonFrame = document.getElementById('lessonFrame');
    const lessonTitle = document.getElementById('lessonTitle');
    const backBtn = document.getElementById('backBtn');

    function openLesson(title, url) {
      lessonTitle.textContent = title;
      lessonFrame.src = url;
      gridView.classList.add('hidden');
      lessonView.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goHome() {
      lessonFrame.src = '';
      lessonView.classList.remove('show');
      gridView.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    cards.forEach(card => {
      card.addEventListener('click', () => {
        openLesson(card.dataset.title, card.dataset.url);
      });
    });

    backBtn.addEventListener('click', goHome);
  </script>
</body>
</html>
