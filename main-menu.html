<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לומדת הכנה ל־5 יחידות בגרות בחקלאות</title>
  <meta name="description" content="מסך ראשי ללומדות הכנה ל־5 יחידות בגרות בחקלאות" />
  <style>
    :root{
      --bg1:#f6fbf5;
      --bg2:#e7f4eb;
      --panel:#ffffff;
      --text:#18311f;
      --muted:#5c7363;
      --accent:#4a8c5f;
      --accent-dark:#2c6a45;
      --border:#d8e7da;
      --shadow:0 14px 36px rgba(24,49,31,0.10);
      --shadow-strong:0 18px 40px rgba(24,49,31,0.16);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1250px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(255,255,255,0.95), rgba(245,252,246,0.95));
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:28px 24px;
      margin-bottom:24px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:-40px;
      top:-40px;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(134,197,163,0.25), transparent 70%);
      pointer-events:none;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#edf8ef;
      color:var(--accent-dark);
      border:1px solid #d4ead8;
      border-radius:999px;
      padding:8px 14px;
      font-size:14px;
      font-weight:700;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(30px,4vw,48px);
      line-height:1.1;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.8;
      max-width:860px;
    }

    .grid-view{display:block}
    .grid-view.hidden{display:none}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:290px;
      text-decoration:none;
      color:inherit;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor:pointer;
      position:relative;
    }

    .card:hover,
    .card:focus-visible{
      transform:translateY(-6px) scale(1.01);
      box-shadow:var(--shadow-strong);
      border-color:#b9d6bf;
      outline:none;
    }

    .card-media{
      height:150px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:60px;
      overflow:hidden;
    }

    .card-media::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));
    }

    .theme-intro{background:linear-gradient(135deg,#f6d365,#fda085)}
    .theme-heat{background:linear-gradient(135deg,#f093fb,#f5576c)}
    .theme-farmer{background:linear-gradient(135deg,#84fab0,#8fd3f4)}
    .theme-immune{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
    .theme-breath{background:linear-gradient(135deg,#c2e9fb,#81a4fd)}
    .theme-default{background:linear-gradient(135deg,#d4fc79,#96e6a1)}

    .card-body{
      padding:18px 18px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .card-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
    }

    .card-text{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
    }

    .card-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:auto;
      font-size:14px;
      font-weight:700;
      color:var(--accent-dark);
      padding-top:6px;
    }

    .arrow{
      width:40px;
      height:40px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#edf8ef;
      border:1px solid #d4ead8;
      flex-shrink:0;
    }

    .lesson-view{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:#fff;
      overflow:hidden;
    }

    .lesson-view.show{display:block}

    .lesson-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 20px;
      background:linear-gradient(135deg,#eef8f0,#f8fbf8);
      border-bottom:1px solid var(--border);
      min-height:76px;
    }

    .lesson-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:transform 0.15s ease, opacity 0.15s ease;
      background:var(--accent);
      color:#fff;
    }

    .btn:hover{transform:translateY(-1px)}

    .iframe-wrap{
      height:calc(100vh - 76px);
      min-height:0;
      background:#fff;
      position:relative;
    }

    .floating-home{
      position:fixed;
      left:20px;
      bottom:20px;
      z-index:1100;
      border:none;
      border-radius:999px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      box-shadow:0 12px 26px rgba(24,49,31,0.20);
      display:none;
      align-items:center;
      gap:10px;
    }

    .floating-home.show{
      display:inline-flex;
    }

    .floating-home:hover{
      transform:translateY(-1px);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    @media (max-width: 740px){
      .hero{padding:22px 16px}
      .subtitle{font-size:16px}
      .card{min-height:270px}
      .card-title{font-size:22px}
      .lesson-title{font-size:21px}
      .lesson-topbar{padding:14px 16px; min-height:72px}
      .iframe-wrap{height:calc(100vh - 72px)}
      .floating-home{
        left:14px;
        right:14px;
        bottom:14px;
        justify-content:center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="badge">לימוד עצמאי והכנה לבגרות</span>
      <h1>לומדת הכנה ל־5 יחידות בגרות בחקלאות</h1>
      <p class="subtitle">כאן תמצאו את כל הלומדות במקום אחד: נושאי יסוד, סיכומים, המחשות ותרגול אינטראקטיבי בדרך ברורה, קצרה ונוחה ללמידה.</p>
    </section>

    <section id="gridView" class="grid-view">
      <main id="cardsGrid" class="grid" aria-live="polite">
        <button class="card" data-title="מבוא לחקלאות" data-url="mavo.html" type="button">
          <div class="card-media theme-intro" aria-hidden="true">🌱</div>
          <div class="card-body">
            <h2 class="card-title">מבוא לחקלאות</h2>
            <p class="card-text">מושגי יסוד, רקע והבנה ראשונית של עולם החקלאות.</p>
            <div class="card-footer"><span>כניסה ללומדה</span><span class="arrow">←</span></div>
          </div>
        </button>

        <button class="card" data-title="ויסות חום בעלי חיים" data-url="visut-hom-klali.html" type="button">
          <div class="card-media theme-heat" aria-hidden="true">🌡️</div>
          <div class="card-body">
            <h2 class="card-title">ויסות חום בעלי חיים</h2>
            <p class="card-text">הבנת שמירת חום הגוף, התאמה לסביבה ומנגנוני קירור וחימום.</p>
            <div class="card-footer"><span>כניסה ללומדה</span><span class="arrow">←</span></div>
          </div>
        </button>

        <button class="card" data-title="ויסות חום על ידי החקלאי" data-url="visut-hom-haklai.html" type="button">
          <div class="card-media theme-farmer" aria-hidden="true">🐔</div>
          <div class="card-body">
            <h2 class="card-title">ויסות חום על ידי החקלאי</h2>
            <p class="card-text">תנאי ממשק, אוורור, חימום, קירור וטיפול נכון בסביבת הגידול.</p>
            <div class="card-footer"><span>כניסה ללומדה</span><span class="arrow">←</span></div>
          </div>
        </button>

        <button class="card" data-title="מערכת החיסון" data-url="maarehet-hisun.html" type="button">
          <div class="card-media theme-immune" aria-hidden="true">🛡️</div>
          <div class="card-body">
            <h2 class="card-title">מערכת החיסון</h2>
            <p class="card-text">מחלות, קווי הגנה, חיסונים, מונחים מרכזיים ותרגול להבנה.</p>
            <div class="card-footer"><span>כניסה ללומדה</span><span class="arrow">←</span></div>
          </div>
        </button>

        <button class="card" data-title="מערכת הנשימה" data-url="maarehet-neshima.html" type="button">
          <div class="card-media theme-breath" aria-hidden="true">🫁</div>
          <div class="card-body">
            <h2 class="card-title">מערכת הנשימה</h2>
            <p class="card-text">מבנה מערכת הנשימה, חילוף גזים, נשימה בעופות וביונקים ותרגול.</p>
            <div class="card-footer"><span>כניסה ללומדה</span><span class="arrow">←</span></div>
          </div>
        </button>
      </main>
    </section>

    <section id="lessonView" class="lesson-view" aria-live="polite">
      <div class="lesson-topbar">
        <h2 id="lessonTitle" class="lesson-title">שם הלומדה</h2>
        <button id="backBtn" class="btn" type="button">חזרה למסך הראשי</button>
      </div>
      <div class="iframe-wrap">
        <iframe id="lessonFrame" title="לומדה"></iframe>
      </div>
    </section>

    <button id="floatingHomeBtn" class="floating-home" type="button">⌂ חזרה לתפריט הראשי</button>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll('.card'));
    const gridView = document.getElementById('gridView');
    const lessonView = document.getElementById('lessonView');
    const lessonFrame = document.getElementById('lessonFrame');
    const lessonTitle = document.getElementById('lessonTitle');
    const backBtn = document.getElementById('backBtn');
    const floatingHomeBtn = document.getElementById('floatingHomeBtn');

    function openLesson(title, url) {
      lessonTitle.textContent = title;
      lessonFrame.src = url;
      gridView.classList.add('hidden');
      lessonView.classList.add('show');
      floatingHomeBtn.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goHome() {
      lessonFrame.src = '';
      lessonView.classList.remove('show');
      gridView.classList.remove('hidden');
      floatingHomeBtn.classList.remove('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    cards.forEach(card => {
      card.addEventListener('click', () => {
        openLesson(card.dataset.title, card.dataset.url);
      });
    });

    backBtn.addEventListener('click', goHome);
    floatingHomeBtn.addEventListener('click', goHome);
  </script>
</body>
</html>
